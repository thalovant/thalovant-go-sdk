name: Published module smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published Go module version to verify
        required: true
        default: v0.3.0

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      GOPROXY: https://proxy.golang.org
      GOSUMDB: sum.golang.org
      GOPRIVATE: ""
      GONOSUMDB: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"
          cache: false
      - name: Resolve the public immutable module tag and compile a clean consumer
        working-directory: smoke/published
        env:
          PACKAGE_VERSION: ${{ inputs.version }}
        run: |
          test "$(go env GOPROXY)" = "https://proxy.golang.org"
          test -z "$(go env GOPRIVATE)"
          test -z "$(go env GONOSUMDB)"
          go mod edit -require="github.com/thalovant/thalovant-go-sdk@$PACKAGE_VERSION"
          go mod tidy
          go run .
