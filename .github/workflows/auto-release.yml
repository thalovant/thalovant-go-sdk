name: Auto Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: auto-release-go-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release unpublished version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Plan automatic release
        id: plan
        run: |
          relevant=false
          relevant_files=""
          latest_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
          if [ -z "$latest_tag" ]; then
            relevant=true
          else
            while IFS= read -r file_path; do
              case "$file_path" in
                VERSION|go.mod|go.sum|constants.go|rich.go|context.go|crypto.go|events.go|identity.go|errors.go|transport.go|client.go|README.md|LICENSE)
                  relevant=true
                  relevant_files="${relevant_files}${file_path}
"
                  ;;
              esac
            done <<EOF
          $(git diff --name-only "$latest_tag..HEAD")
          EOF
          fi

          VERSION="$(tr -d '[:space:]' < VERSION | sed 's/^v//')"
          printf '%s\n' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          current_tag="v$VERSION"

          if [ "$relevant" != "true" ]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "No release-relevant SDK changes since the latest tag."
            exit 0
          fi

          if [ "$latest_tag" = "$current_tag" ] && [ "$(printf '%s' "$relevant_files" | sed '/^$/d')" = "VERSION" ]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$current_tag" >> "$GITHUB_OUTPUT"
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "VERSION establishes the existing $current_tag baseline."
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/$current_tag" >/dev/null; then
            case "$VERSION" in
              *.*.*)
                major="${VERSION%%.*}"
                rest="${VERSION#*.}"
                minor="${rest%%.*}"
                patch="${rest#*.}"
                ;;
              *)
                echo "Cannot auto-bump non-standard version: $VERSION"
                exit 1
                ;;
            esac
            printf '%s\n' "$patch" | grep -Eq '^[0-9]+$'
            NEXT_VERSION="$major.$minor.$((patch + 1))"
            printf '%s\n' "$NEXT_VERSION" > VERSION
            sed -i "s/ThalovantGoSDK\/$VERSION/ThalovantGoSDK\/$NEXT_VERSION/g" constants.go
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add VERSION constants.go
            git commit -m "release: bump Go SDK to $NEXT_VERSION"
            git push origin HEAD:main
            VERSION="$NEXT_VERSION"
          fi

          echo "release_needed=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        if: steps.plan.outputs.release_needed == 'true'
        run: test -z "$(gofmt -l .)"

      - name: Run vet
        if: steps.plan.outputs.release_needed == 'true'
        run: go vet ./...

      - name: Run tests
        if: steps.plan.outputs.release_needed == 'true'
        run: go test ./...

      - name: Create GitHub release
        if: steps.plan.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.plan.outputs.tag }}
          RELEASE_SHA: ${{ steps.plan.outputs.release_sha }}
        run: gh release create "$TAG" --target "$RELEASE_SHA" --title "$TAG" --notes "Release $TAG"
