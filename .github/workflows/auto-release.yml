name: Auto Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: auto-release-go-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release unpublished version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25"
          cache: false

      - name: Plan automatic release
        id: plan
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re
          import subprocess

          relevant_paths = (
              "VERSION",
              "go.mod",
              "go.sum",
              "constants.go",
              "control.go",
              "rich.go",
              "context.go",
              "crypto.go",
              "events.go",
              "identity.go",
              "errors.go",
              "mqtt_topics.go",
              "protocols.go",
              "transport.go",
              "transport_mqtt.go",
              "transport_wss.go",
              "wire.go",
              "client.go",
              "README.md",
              "LICENSE",
          )

          def git(*args: str, check: bool = True) -> str:
              result = subprocess.run(
                  ["git", *args],
                  check=check,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              return result.stdout.strip()

          def tag_exists(tag: str) -> bool:
              return subprocess.run(
                  ["git", "rev-parse", "-q", "--verify", f"refs/tags/{tag}"],
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.DEVNULL,
              ).returncode == 0

          def version() -> str:
              current = pathlib.Path("VERSION").read_text().strip().removeprefix("v")
              if not re.fullmatch(r"\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?", current):
                  raise SystemExit(f"Invalid VERSION value: {current}")
              return current

          def changed_since_latest_tag() -> tuple[str | None, list[str]]:
              latest = subprocess.run(
                  ["git", "describe", "--tags", "--abbrev=0", "--match", "v[0-9]*"],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.DEVNULL,
                  text=True,
              )
              if latest.returncode != 0:
                  return None, ["<initial-release>"]
              latest_tag = latest.stdout.strip()
              files = [
                  line
                  for line in git("diff", "--name-only", f"{latest_tag}..HEAD").splitlines()
                  if line
              ]
              return latest_tag, files

          def bump_patch(current: str) -> str:
              match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", current)
              if not match:
                  raise SystemExit(f"Cannot auto-bump non-standard version: {current}")
              major, minor, patch = (int(part) for part in match.groups())
              return f"{major}.{minor}.{patch + 1}"

          latest_tag, changed = changed_since_latest_tag()
          relevant = [
              path
              for path in changed
              if path == "<initial-release>" or path in relevant_paths
          ]
          current = version()
          current_tag = f"v{current}"

          def write_output(release_needed: bool, value: str) -> None:
              with open(os.environ["GITHUB_OUTPUT"], "a") as output:
                  output.write(f"release_needed={str(release_needed).lower()}\n")
                  output.write(f"version={value}\n")
                  output.write(f"tag=v{value}\n")
                  output.write(f"release_sha={git('rev-parse', 'HEAD')}\n")

          if not relevant:
              write_output(False, current)
              print("No release-relevant SDK changes since the latest tag.")
              raise SystemExit(0)

          if latest_tag == current_tag and relevant == ["VERSION"]:
              write_output(False, current)
              print(f"VERSION establishes the existing {current_tag} baseline.")
              raise SystemExit(0)

          if tag_exists(current_tag):
              next_version = bump_patch(current)
              pathlib.Path("VERSION").write_text(f"{next_version}\n")
              constants = pathlib.Path("constants.go")
              constants.write_text(constants.read_text().replace(f"ThalovantGoSDK/{current}", f"ThalovantGoSDK/{next_version}"))
              git("config", "user.name", "github-actions[bot]")
              git("config", "user.email", "41898282+github-actions[bot]@users.noreply.github.com")
              git("add", "VERSION", "constants.go")
              git("commit", "-m", f"release: bump Go SDK to {next_version}")
              git("push", "origin", "HEAD:main")
              current = next_version

          write_output(True, current)
          PY

      - name: Check formatting
        if: steps.plan.outputs.release_needed == 'true'
        run: test -z "$(gofmt -l .)"

      - name: Run vet
        if: steps.plan.outputs.release_needed == 'true'
        run: go vet ./...

      - name: Run tests
        if: steps.plan.outputs.release_needed == 'true'
        run: go test ./...

      - name: Build source artifact and CycloneDX SBOM
        if: steps.plan.outputs.release_needed == 'true'
        id: artifacts
        env:
          PACKAGE_VERSION: ${{ steps.plan.outputs.version }}
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
          SOURCE_REVISION: ${{ steps.plan.outputs.release_sha }}
        run: |
          mkdir -p release-artifacts
          git tag "$RELEASE_TAG" HEAD
          git archive --format=tar --prefix="thalovant-go-sdk-$PACKAGE_VERSION/" HEAD \
            | gzip -n > "release-artifacts/thalovant-go-sdk-$PACKAGE_VERSION.tar.gz"
          sbom="release-artifacts/thalovant-go-sdk-$PACKAGE_VERSION.cdx.json"
          go run github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0 \
            mod -json -noserial -notimestamp -type library -output-version 1.6 \
            -output "$sbom" .
          python3 - "$sbom" <<'PY'
          import json
          import os
          import pathlib
          import sys
          import uuid

          path = pathlib.Path(sys.argv[1])
          bom = json.loads(path.read_text())
          revision = os.environ["SOURCE_REVISION"]
          identity = f"https://github.com/thalovant/thalovant-go-sdk@{revision}"
          bom["serialNumber"] = f"urn:uuid:{uuid.uuid5(uuid.NAMESPACE_URL, identity)}"
          if not all(bom.get(field) for field in ("bomFormat", "specVersion", "serialNumber")):
              raise SystemExit("generated CycloneDX SBOM lacks an attestation identity field")
          path.write_text(json.dumps(bom, sort_keys=True, separators=(",", ":")) + "\n")
          PY
          echo "source=$GITHUB_WORKSPACE/release-artifacts/thalovant-go-sdk-$PACKAGE_VERSION.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sbom=$GITHUB_WORKSPACE/$sbom" >> "$GITHUB_OUTPUT"

      - name: Attest module source provenance
        if: steps.plan.outputs.release_needed == 'true'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ steps.artifacts.outputs.source }}

      - name: Attest module source SBOM
        if: steps.plan.outputs.release_needed == 'true'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ steps.artifacts.outputs.source }}
          sbom-path: ${{ steps.artifacts.outputs.sbom }}

      - name: Create GitHub release
        if: steps.plan.outputs.release_needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.plan.outputs.tag }}
          RELEASE_SHA: ${{ steps.plan.outputs.release_sha }}
          SOURCE_ARCHIVE: ${{ steps.artifacts.outputs.source }}
          SBOM: ${{ steps.artifacts.outputs.sbom }}
        run: gh release create "$TAG" "$SOURCE_ARCHIVE" "$SBOM" --target "$RELEASE_SHA" --title "$TAG" --notes "Release $TAG"
